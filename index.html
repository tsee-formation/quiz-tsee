<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Formation - TSEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { carmillon: '#84002b', anthracite: '#30363d' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-sncf { background: linear-gradient(135deg, #30363d 0%, #1a1e22 100%); }
        .btn-option:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gradient-sncf text-slate-100 min-h-screen">

    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        
        <div class="mb-8 transform hover:scale-105 transition-transform">
            <div class="bg-carmillon w-24 h-24 rounded-2xl flex items-center justify-center border-4 border-white/10 shadow-2xl">
                <span class="text-white font-black text-2xl tracking-tighter">TSEE</span>
            </div>
        </div>

        <div id="ecran-accueil" class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-[10px] border-carmillon text-anthracite">
            <h1 class="text-3xl font-black text-center mb-2 uppercase tracking-tighter">Examen de Révision</h1>
            <p class="text-carmillon text-center font-bold mb-10 text-sm tracking-widest uppercase">Module MAT02CD2A2 - STRICT</p>

            <div class="space-y-8">
                <div class="relative text-center">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Identifiant Agent (CP)</label>
                    <input type="text" id="username" 
                        class="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-carmillon focus:ring-4 focus:ring-carmillon/10 outline-none font-bold text-center text-2xl uppercase transition-all text-anthracite" 
                        placeholder="Ex: 1234567X">
                </div>
                <button onclick="demarrerLeQuiz()" class="w-full bg-carmillon hover:bg-red-900 text-white font-black py-5 rounded-xl shadow-xl transition-all uppercase tracking-widest text-sm">
                    Lancer l'examen
                </button>
            </div>
        </div>

        <div id="ecran-quiz" class="hidden bg-white p-10 rounded-2xl shadow-2xl w-full max-w-lg border-t-[10px] border-carmillon text-anthracite">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Progression</span>
                    <span id="progression" class="font-black">Question 1/20</span>
                </div>
                <div class="text-right">
                    <span id="affichage-nom" class="bg-carmillon/10 text-carmillon px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">Agent</span>
                </div>
            </div>

            <h2 id="question-texte" class="text-xl font-bold mb-10 leading-tight min-h-[60px]">Chargement...</h2>

            <div id="options-container" class="space-y-4"></div>
        </div>

        <div id="ecran-resultats" class="hidden bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-[10px] border-carmillon text-center text-anthracite">
            <div class="mb-6 inline-block p-4 rounded-full bg-slate-50">
                <span class="text-5xl">🏆</span>
            </div>
            <h2 class="text-3xl font-black uppercase mb-2">Bilan Examen</h2>
            <p id="nom-final" class="text-carmillon font-bold mb-8 italic"></p>
            
            <div class="bg-slate-50 rounded-2xl p-8 mb-8 border-2 border-slate-100">
                <div class="text-6xl font-black mb-2">
                    <span id="score-chiffre">0</span><span class="text-3xl text-slate-300">/20</span>
                </div>
                <p id="appreciation" class="font-black text-sm uppercase tracking-widest"></p>
            </div>

            <div class="grid grid-cols-1 gap-4 text-white">
                <button onclick="genererAttestation()" class="w-full bg-green-600 hover:bg-green-700 font-black py-5 rounded-xl shadow-lg transition-all uppercase text-xs flex items-center justify-center gap-2 active:scale-95">
                    <span>📄</span> ÉDITER MON ATTESTATION PRO
                </button>
                <button onclick="location.reload()" class="w-full bg-anthracite hover:bg-black font-black py-4 rounded-xl shadow transition-all uppercase text-[10px] tracking-widest opacity-70">
                    Recommencer le test
                </button>
            </div>
        </div>
    </div>

    <script>
        const toutesLesQuestions = [
            { q: "Quelle aptitude est indispensable au conducteur selon l'OPG1 ?", opts: ["Vitesse", "Rigueur", "Force"], rep: 1 },
            { q: "Que signifie 'H' dans l'alphabet phonétique SNCF ?", opts: ["Hélico", "Hôtel", "Haricot"], rep: 1 },
            { q: "Obligation du conducteur : que faire pour les victimes d'accidents ?", opts: ["Attendre", "Secourir", "Appeler la presse"], rep: 1 },
            { q: "Quelle est la tension en Courant Continu (CC) ?", opts: ["750V", "1500V", "25000V"], rep: 1 },
            { q: "Distance minimale pour traverser devant un matériel à l'arrêt ?", opts: ["1m", "3m", "5m"], rep: 1 },
            { q: "Que signifie un liseré bleu sur un support caténaire ?", opts: ["H < 5m", "H > 5m", "Danger"], rep: 0 },
            { q: "Quelle est la vitesse max en marche en manœuvre ?", opts: ["10 km/h", "30 km/h", "60 km/h"], rep: 1 },
            { q: "Que signifie l'ordre 'Appuyez' ?", opts: ["Arrêt", "Mouvement faible pour accoupler", "Urgence"], rep: 1 },
            { q: "Écartement standard des rails ?", opts: ["1,435 m", "1,500 m", "1,600 m"], rep: 0 },
            { q: "Rôle du ballast ?", opts: ["Décoration", "Répartir les charges", "Isoler le courant"], rep: 1 },
            { q: "Que signifie l'indice 'Z' d'un engin moteur ?", opts: ["Thermique", "Bicourant", "Vapeur"], rep: 1 },
            { q: "Téléphone à bandeau VERT ?", opts: ["Gendarmerie", "Régulateur", "Chef d'escale"], rep: 1 },
            { q: "Distance de couverture d'un obstacle (CLO) ?", opts: ["10m", "30m", "50m"], rep: 1 },
            { q: "Un Carré (C) fermé impose :", opts: ["Arrêt absolu", "10 km/h", "Marche à vue"], rep: 0 },
            { q: "Que vérifier après avoir manœuvré un taquet ?", opts: ["L'obéissance", "La propreté", "La couleur"], rep: 0 },
            { q: "Chevron pointe en haut sur voie de service ?", opts: ["Accélérez", "Arrêt avant", "Voie libre"], rep: 1 },
            { q: "Signe précoce d'hypovigilance ?", opts: ["Faim", "Picotement oculaire", "Chaleur"], rep: 1 },
            { q: "Organe protégeant le circuit HT ?", opts: ["Le panto", "Le disjoncteur", "Le compresseur"], rep: 1 },
            { q: "Aiguille 'à gauche' (en pointe) : quelle lame est appliquée ?", opts: ["La gauche", "La droite", "Aucune"], rep: 1 },
            { q: "Interlocuteur pour un journaliste ?", opts: ["Vous", "Le service presse", "Le DPX"], rep: 1 }
        ];

        let questionsSelectionnees = [];
        let index = 0, score = 0, nomAgent = "", historique = [];

        function melanger(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function demarrerLeQuiz() {
            const input = document.getElementById('username');
            if (input.value.trim().length < 3) { alert("Veuillez saisir votre CP."); return; }
            nomAgent = input.value.trim();
            document.getElementById('ecran-accueil').classList.add('hidden');
            document.getElementById('ecran-quiz').classList.remove('hidden');
            document.getElementById('affichage-nom').innerText = nomAgent;
            questionsSelectionnees = melanger([...toutesLesQuestions]);
            chargerQuestion();
        }

        function chargerQuestion() {
            const q = questionsSelectionnees[index];
            document.getElementById('question-texte').innerText = q.q;
            document.getElementById('progression').innerText = "Question " + (index + 1) + "/" + questionsSelectionnees.length;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const bonneReponseTexte = q.opts[q.rep];
            const optionsMelangees = melanger([...q.opts]);
            optionsMelangees.forEach((o) => {
                const btn = document.createElement('button');
                btn.innerText = o;
                btn.className = "btn-option w-full text-left p-5 rounded-xl border-2 border-slate-100 hover:border-carmillon hover:bg-slate-50 font-bold transition-all text-sm text-anthracite shadow-sm";
                btn.onclick = () => verifier(o, bonneReponseTexte);
                container.appendChild(btn);
            });
        }

        function verifier(choix, bonneReponse) {
            const estJuste = (choix === bonneReponse);
            if(estJuste) score++;
            historique.push({ q: questionsSelectionnees[index].q, choix: choix, juste: bonneReponse, ok: estJuste });
            index++;
            if(index < questionsSelectionnees.length) chargerQuestion();
            else finirQuiz();
        }

        function finirQuiz() {
            document.getElementById('ecran-quiz').classList.add('hidden');
            document.getElementById('ecran-resultats').classList.remove('hidden');
            document.getElementById('nom-final').innerText = "AGENT CP : " + nomAgent;
            document.getElementById('score-chiffre').innerText = score;
            const aprem = document.getElementById('appreciation');
            if(score >= 18) { aprem.innerText = "Maîtrise Parfaite"; aprem.style.color = "#16a34a"; }
            else if(score >= 14) { aprem.innerText = "Résultat Satisfaisant"; aprem.style.color = "#2563eb"; }
            else { aprem.innerText = "Formation à consolider"; aprem.style.color = "#84002b"; }
        }

        function genererAttestation() {
            const d = new Date();
            const dateStr = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
            
            let lignes = historique.map((h, i) => `
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding:10px; font-size:10px; color:#64748b;">${i+1}</td>
                    <td style="padding:10px; font-size:11px; font-weight:500;">${h.q}</td>
                    <td style="padding:10px; font-weight:bold; font-size:10px; color:${h.ok?'#16a34a':'#84002b'}">${h.ok?'VALIDE':'ÉCHEC'}</td>
                    <td style="padding:10px; font-size:10px; color:#64748b; font-style:italic;">${h.ok ? '' : h.juste}</td>
                </tr>`).join('');

            const win = window.open('', '', 'width=1000,height=1200');
            win.document.write(`
                <html><head><title>Attestation_${nomAgent}</title>
                <style>
                    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; padding: 40px; margin: 0; }
                    .page { background: white; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 20mm; box-sizing: border-box; border: 15px solid #30363d; position: relative; }
                    .inner-border { border: 2px solid #84002b; padding: 30px; min-height: 230mm; position: relative; }
                    .header { text-align: center; border-bottom: 3px solid #84002b; padding-bottom: 20px; margin-bottom: 40px; }
                    .logo { background: #84002b; color: white; display: inline-block; padding: 10px 20px; font-weight: 900; font-size: 24px; border-radius: 4px; margin-bottom: 15px; }
                    .title { text-transform: uppercase; letter-spacing: 2px; color: #30363d; margin: 0; font-size: 28px; }
                    .subtitle { color: #64748b; font-weight: bold; margin-top: 5px; }
                    .main-text { text-align: center; font-size: 18px; line-height: 1.6; margin: 40px 0; }
                    .agent-name { color: #84002b; font-weight: 900; font-size: 24px; text-decoration: underline; }
                    .score-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px; padding: 20px; display: inline-block; margin: 20px 0; }
                    .score-value { font-size: 40px; font-weight: 900; color: #30363d; }
                    table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; }
                    th { background: #30363d; color: white; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
                    .stamp { position: absolute; bottom: 40px; right: 40px; border: 4px double #84002b; color: #84002b; padding: 10px 20px; font-weight: bold; transform: rotate(-5deg); text-transform: uppercase; font-size: 14px; text-align: center; }
                    @media print { body { background: none; padding: 0; } .page { border: none; } }
                </style></head>
                <body>
                    <div class="page">
                        <div class="inner-border">
                            <div class="header">
                                <div class="logo">TSEE</div>
                                <h1 class="title">Attestation de Réussite</h1>
                                <div class="subtitle">Sécurité des circulations - Module MAT02CD2A2</div>
                            </div>
                            
                            <div class="main-text">
                                Il est certifié que l'agent identifié sous le CP :<br>
                                <span class="agent-name">${nomAgent}</span><br>
                                a complété son évaluation avec le score suivant :<br>
                                <div class="score-box">
                                    <span class="score-value">${score} / 20</span>
                                </div>
                            </div>

                            <table>
                                <thead>
                                    <tr><th>N°</th><th>Question posée</th><th>Résultat</th><th>Correction si échec</th></tr>
                                </thead>
                                <tbody>${lignes}</tbody>
                            </table>

                            <div class="stamp">
                                Validé le ${dateStr}<br>
                                Système TSEE-Quiz
                            </div>
                        </div>
                    </div>
                    <script>window.onload = function(){ setTimeout(function(){ window.print(); }, 1000); }<\/script>
                </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
