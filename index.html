<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Remiseur - TSEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { carmillon: '#84002b', anthracite: '#30363d' }
                }
            }
        }
    </script>
</head>
<body class="bg-anthracite text-slate-100 font-sans">

    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        
        <!-- LOGO TSEE -->
        <div class="mb-6 shadow-2xl">
            <div class="bg-carmillon w-20 h-20 rounded-full flex items-center justify-center border-4 border-white/20">
                <span class="text-white font-extrabold text-xl tracking-tighter">TSEE</span>
            </div>
        </div>

        <!-- ÉCRAN 1 : ACCUEIL -->
        <div id="ecran-accueil" class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md border-t-8 border-carmillon">
            <h1 class="text-2xl font-black text-anthracite text-center mb-1 uppercase tracking-tighter">Espace Formation</h1>
            <p class="text-carmillon text-center font-bold mb-8 text-sm uppercase">MAT02CD2A2 - MODULE 2 CONDUITE</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1 text-center text-slate-400">Identifiant Agent (CP)</label>
                    <input type="text" id="username" class="w-full p-3 rounded border-2 border-slate-200 focus:border-carmillon outline-none text-anthracite font-semibold text-center text-xl uppercase" placeholder="Ex: 1234567X">
                </div>
                <button onclick="demarrerLeQuiz()" class="w-full bg-carmillon hover:bg-red-900 text-white font-bold py-4 rounded shadow-lg transition-all active:scale-95 uppercase tracking-widest text-sm">
                    Lancer l'examen
                </button>
            </div>
        </div>

        <!-- ÉCRAN 2 : LE QUIZ -->
        <div id="ecran-quiz" class="hidden bg-white p-8 rounded-lg shadow-2xl w-full max-w-md border-t-8 border-carmillon">
            <div class="flex justify-between items-center mb-6">
                <span id="progression" class="text-xs font-bold text-slate-400 uppercase">Question 1/20</span>
                <span id="affichage-nom" class="text-xs font-bold text-carmillon uppercase">Agent</span>
            </div>

            <h2 id="question-texte" class="text-lg font-bold text-anthracite mb-8 leading-tight">Chargement...</h2>

            <div id="options-container" class="space-y-3"></div>

            <div id="feedback" class="mt-6 p-4 rounded hidden font-bold text-center"></div>
        </div>

        <!-- ÉCRAN 3 : RÉSULTATS -->
        <div id="ecran-resultats" class="hidden bg-white p-8 rounded-lg shadow-2xl w-full max-w-md border-t-8 border-carmillon text-center">
            <h2 class="text-2xl font-black text-anthracite uppercase mb-2">Résultat Final</h2>
            <p id="nom-final" class="text-carmillon font-bold mb-6 italic"></p>
            
            <div class="text-5xl font-black text-anthracite mb-4">
                <span id="score-chiffre">0</span><span class="text-2xl text-slate-400">/20</span>
            </div>

            <p id="appreciation" class="font-bold text-lg mb-8"></p>

            <div class="grid grid-cols-1 gap-3">
                <button onclick="genererAttestation()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded shadow transition-all uppercase text-xs flex items-center justify-center gap-2">
                    🎓 Editer mon attestation (PDF)
                </button>
                <button onclick="location.reload()" class="w-full bg-anthracite hover:bg-black text-white font-bold py-4 rounded shadow transition-all uppercase text-xs">
                    Recommencer le test
                </button>
            </div>
        </div>
    </div>

    <script>
        const mesQuestions = [
            { q: "Quelle aptitude est indispensable au conducteur selon l'OPG1 ?", opts: ["Vitesse", "Rigueur", "Force"], rep: 1 },
            { q: "Que signifie 'H' dans l'alphabet phonétique SNCF ?", opts: ["Hélico", "Hôtel", "Haricot"], rep: 1 },
            { q: "Obligation du conducteur : que faire pour les victimes d'accidents ?", opts: ["Attendre", "Secourir", "Appeler la presse"], rep: 1 },
            { q: "Quelle est la tension en Courant Continu (CC) ?", opts: ["750V", "1500V", "25000V"], rep: 1 },
            { q: "Distance minimale pour traverser devant un matériel à l'arrêt ?", opts: ["1m", "3m", "5m"], rep: 1 },
            { q: "Que signifie un liseré bleu sur un support caténaire ?", opts: ["H < 5m", "H > 5m", "Danger"], rep: 0 },
            { q: "Quelle est la vitesse max en marche en manœuvre ?", opts: ["10 km/h", "30 km/h", "60 km/h"], rep: 1 },
            { q: "Que signifie l'ordre 'Appuyez' ?", opts: ["Arrêt", "Mouvement faible pour accoupler", "Urgence"], rep: 1 },
            { q: "Écartement standard des rails ?", opts: ["1,435 m", "1,500 m", "1,600 m"], rep: 0 },
            { q: "Rôle du ballast ?", opts: ["Décoration", "Répartir les charges", "Isoler le courant"], rep: 1 },
            { q: "Que signifie l'indice 'Z' d'un engin moteur ?", opts: ["Thermique", "Bicourant", "Vapeur"], rep: 1 },
            { q: "Téléphone à bandeau VERT ?", opts: ["Gendarmerie", "Régulateur", "Chef d'escale"], rep: 1 },
            { q: "Distance de couverture d'un obstacle (CLO) ?", opts: ["10m", "30m", "50m"], rep: 1 },
            { q: "Un Carré (C) fermé impose :", opts: ["Arrêt absolu", "10 km/h", "Marche à vue"], rep: 0 },
            { q: "Que vérifier après avoir manœuvré un taquet ?", opts: ["L'obéissance", "La propreté", "La couleur"], rep: 0 },
            { q: "Chevron pointe en haut sur voie de service ?", opts: ["Accélérez", "Arrêt avant", "Voie libre"], rep: 1 },
            { q: "Signe précoce d'hypovigilance ?", opts: ["Faim", "Picotement oculaire", "Chaleur"], rep: 1 },
            { q: "Organe protégeant le circuit HT ?", opts: ["Le panto", "Le disjoncteur", "Le compresseur"], rep: 1 },
            { q: "Aiguille 'à gauche' (en pointe) : quelle lame est appliquée ?", opts: ["La gauche", "La droite", "Aucune"], rep: 1 },
            { q: "Interlocuteur pour un journaliste ?", opts: ["Vous", "Le service presse", "Le DPX"], rep: 1 }
        ];

        let index = 0;
        let score = 0;
        let nom = "";
        let historique = [];

        function melangerTableau(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function demarrerLeQuiz() {
            const inputNom = document.getElementById('username');
            if (inputNom.value.trim().length < 3) {
                alert("Veuillez saisir votre CP.");
                return;
            }
            nom = inputNom.value.trim();
            document.getElementById('ecran-accueil').classList.add('hidden');
            document.getElementById('ecran-quiz').classList.remove('hidden');
            document.getElementById('affichage-nom').innerText = "Agent: " + nom;
            chargerQuestion();
        }

        function chargerQuestion() {
            const current = mesQuestions[index];
            document.getElementById('question-texte').innerText = current.q;
            document.getElementById('progression').innerText = `Question ${index + 1}/${mesQuestions.length}`;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            document.getElementById('feedback').classList.add('hidden');

            const optionsMelangees = melangerTableau([...current.opts]);
            const bonneReponseTexte = current.opts[current.rep];

            optionsMelangees.forEach((o) => {
                const btn = document.createElement('button');
                btn.innerText = o;
                btn.className = "w-full text-left p-4 rounded border-2 border-slate-100 hover:border-carmillon hover:bg-slate-50 text-anthracite font-bold transition-all text-sm";
                btn.onclick = () => verifier(o, bonneReponseTexte);
                container.appendChild(btn);
            });
        }

        function verifier(reponseChoisie, reponseCorrecte) {
            const f = document.getElementById('feedback');
            f.classList.remove('hidden');
            const estJuste = (reponseChoisie === reponseCorrecte);
            
            historique.push({
                q: mesQuestions[index].q,
                repDonnee: reponseChoisie,
                repJuste: reponseCorrecte,
                estJuste: estJuste
            });

            if(estJuste) {
                score++;
                f.innerText = "✅ CORRECT";
                f.className = "mt-6 p-4 rounded font-black text-center bg-green-100 text-green-700";
            } else {
                f.innerText = "❌ ERREUR";
                f.className = "mt-6 p-4 rounded font-black text-center bg-red-100 text-red-700";
            }

            setTimeout(() => {
                index++;
                if(index < mesQuestions.length) {
                    chargerQuestion();
                } else {
                    afficherResultats();
                }
            }, 1000);
        }

        function afficherResultats() {
            document.getElementById('ecran-quiz').classList.add('hidden');
            document.getElementById('ecran-resultats').classList.remove('hidden');
            document.getElementById('nom-final').innerText = "Agent CP: " + nom;
            document.getElementById('score-chiffre').innerText = score;
            const aprem = document.getElementById('appreciation');
            if(score >= 18) { aprem.innerText = "EXCELLENT - Maîtrise acquise."; aprem.className="text-green-600 font-bold"; }
            else if(score >= 14) { aprem.innerText = "BIEN - Quelques points à revoir."; aprem.className="text-blue-600 font-bold"; }
            else { aprem.innerText = "INSUFFISANT - Reprenez le livret MAT02."; aprem.className="text-carmillon font-bold"; }
        }

        function genererAttestation() {
            const d = new Date();
            const dateStr = d.toLocaleDateString();
            const heureStr = d.toLocaleTimeString();

            let lignesTableau = historique.map((h, i) => `
                <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 8px;">Q${i+1}</td>
                    <td style="padding: 8px;">${h.q}</td>
                    <td style="padding: 8px; color: ${h.estJuste ? 'green' : 'red'};">
                        ${h.estJuste ? '<b>VALIDE</b>' : '<b>ÉCHEC</b>'}
                    </td>
                    <td style="padding: 8px; font-size: 0.8em;">${h.estJuste ? '-' : 'Rép attendue : ' + h.repJuste}</td>
                </tr>
            `).join('');

            const fenetre = window.open('', '', 'width=900,height=1000');
            fenetre.document.write(`
                <html>
                <head>
                    <title>Attestation TSEE - ${nom}</title>
                    <style>
                        body { font-family: sans-serif; padding: 40px; color: #333; }
                        .header { border-bottom: 5px solid #84002b; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
                        .logo { background: #84002b; color: white; padding: 15px; font-weight: bold; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
                        .title { text-align: right; }
                        .agent-info { background: #f4f4f4; padding: 20px; border-radius: 5px; margin-bottom: 30px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        .stamp { margin-top: 50px; border: 2px solid #84002b; padding: 15px; display: inline-block; color: #84002b; font-weight: bold; transform: rotate(-5deg); text-transform: uppercase; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="logo">TSEE</div>
                        <div class="title">
                            <h1 style="margin:0; color:#30363d;">Attestation de Révision</h1>
                            <small>Module MAT02CD2A2 - Sécurité Conduite</small>
                        </div>
                    </div>

                    <div class="agent-info">
                        <p><b>Agent (CP) :</b> ${nom}</p>
                        <p><b>Date du test :</b> ${dateStr} à ${heureStr}</p>
                        <p><b>Score obtenu :</b> <span style="font-size: 1.5em; color: #84002b;">${score} / 20</span></p>
                    </div>

                    <h3>Détail de l'examen :</h3>
                    <table>
                        <thead>
                            <tr style="background: #30363d; color: white; text-align: left;">
                                <th style="padding: 10px;">#</th>
                                <th style="padding: 10px;">Question</th>
                                <th style="padding: 10px;">Résultat</th>
                                <th style="padding: 10px;">Correction</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${lignesTableau}
                        </tbody>
                    </table>

                    <div class="stamp">VALIDE LE ${dateStr}</div>

                    <div style="margin-top: 50px; font-size: 0.8em; color: #777; text-align: center;">
                        Document généré numériquement - Espace Formation TSEE
                    </div>

                    <script>
                        window.onload = function() { 
                            setTimeout(function() { window.print(); }, 500);
                        }
                    <\/script>
                </body>
                </html>
            `);
            fenetre.document.close();
        }
    </script>
</body>
</html>
