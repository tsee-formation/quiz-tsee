<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz TSEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-800 text-white font-sans">

    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        
        <!-- ECRAN ACCUEIL -->
        <div id="ecran-accueil" class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md text-slate-800">
            <h1 class="text-2xl font-bold text-center mb-6">Formation TSEE</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full p-3 border-2 border-slate-300 rounded text-center text-lg" placeholder="Votre CP (ex: 1234567X)">
                <button onclick="demarrerLeQuiz()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded uppercase">
                    Lancer le Test
                </button>
            </div>
        </div>

        <!-- ECRAN QUIZ -->
        <div id="ecran-quiz" class="hidden bg-white p-8 rounded-lg shadow-2xl w-full max-w-md text-slate-800">
            <div class="flex justify-between text-xs font-bold text-slate-400 mb-4 uppercase">
                <span id="progression">Question 1/20</span>
                <span id="affichage-nom">Agent</span>
            </div>
            <h2 id="question-texte" class="text-lg font-bold mb-6">...</h2>
            <div id="options-container" class="space-y-3"></div>
            <div id="feedback" class="mt-6 p-4 rounded hidden text-center font-bold"></div>
        </div>

        <!-- ECRAN FINAL -->
        <div id="ecran-resultats" class="hidden bg-white p-8 rounded-lg shadow-2xl w-full max-w-md text-slate-800 text-center">
            <h2 class="text-2xl font-bold mb-4 text-red-700">Résultat</h2>
            <p id="nom-final" class="font-bold mb-2"></p>
            <div class="text-5xl font-black mb-6"><span id="score-chiffre">0</span>/20</div>
            <button onclick="genererAttestation()" class="w-full bg-green-600 text-white font-bold py-3 rounded mb-2">Imprimer mon attestation</button>
            <button onclick="location.reload()" class="w-full bg-slate-200 text-slate-800 font-bold py-3 rounded">Recommencer</button>
        </div>

    </div>

    <script>
        // Liste simplifiée pour le test
        const questions = [
            { q: "Quelle aptitude est indispensable au conducteur selon l'OPG1 ?", opts: ["Vitesse", "Rigueur", "Force"], rep: 1 },
            { q: "Que signifie 'H' dans l'alphabet phonétique SNCF ?", opts: ["Hélico", "Hôtel", "Haricot"], rep: 1 },
            { q: "Quelle est la tension en Courant Continu (CC) ?", opts: ["750V", "1500V", "25000V"], rep: 1 },
            { q: "Distance minimale pour traverser devant un matériel à l'arrêt ?", opts: ["1m", "3m", "5m"], rep: 1 },
            { q: "Que signifie un liseré bleu sur un support caténaire ?", opts: ["H < 5m", "H > 5m", "Danger"], rep: 0 },
            { q: "Vitesse max en marche en manœuvre ?", opts: ["10 km/h", "30 km/h", "60 km/h"], rep: 1 },
            { q: "Que signifie l'ordre 'Appuyez' ?", opts: ["Arrêt", "Mouvement faible", "Urgence"], rep: 1 },
            { q: "Écartement standard des rails ?", opts: ["1,435 m", "1,500 m", "1,600 m"], rep: 0 },
            { q: "Un Carré (C) fermé impose :", opts: ["Arrêt absolu", "10 km/h", "Marche à vue"], rep: 0 },
            { q: "Chevron pointe en haut sur voie de service ?", opts: ["Accélérez", "Arrêt avant", "Voie libre"], rep: 1 }
        ];

        let index = 0;
        let score = 0;
        let nomAgent = "";
        let historique = [];

        function demarrerLeQuiz() {
            const input = document.getElementById('username');
            if (input.value.trim().length < 2) {
                alert("Entrez votre CP svp.");
                return;
            }
            nomAgent = input.value.trim();
            document.getElementById('ecran-accueil').classList.add('hidden');
            document.getElementById('ecran-quiz').classList.remove('hidden');
            document.getElementById('affichage-nom').innerText = nomAgent;
            chargerQuestion();
        }

        function chargerQuestion() {
            const q = questions[index];
            document.getElementById('question-texte').innerText = q.q;
            document.getElementById('progression').innerText = "Question " + (index + 1) + "/" + questions.length;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            document.getElementById('feedback').classList.add('hidden');

            q.opts.forEach((o) => {
                const btn = document.createElement('button');
                btn.innerText = o;
                btn.className = "w-full text-left p-4 rounded border-2 border-slate-200 hover:border-red-700 font-bold";
                btn.onclick = () => verifier(o, q.opts[q.rep]);
                container.appendChild(btn);
            });
        }

        function verifier(choix, bonneReponse) {
            const f = document.getElementById('feedback');
            f.classList.remove('hidden');
            const estJuste = (choix === bonneReponse);
            
            historique.push({ q: questions[index].q, choix: choix, juste: bonneReponse, ok: estJuste });

            if(estJuste) {
                score++;
                f.innerText = "CORRECT";
                f.className = "mt-6 p-4 rounded text-center font-bold bg-green-100 text-green-700";
            } else {
                f.innerText = "ERREUR";
                f.className = "mt-6 p-4 rounded text-center font-bold bg-red-100 text-red-700";
            }

            setTimeout(() => {
                index++;
                if(index < questions.length) chargerQuestion();
                else finirQuiz();
            }, 800);
        }

        function finirQuiz() {
            document.getElementById('ecran-quiz').classList.add('hidden');
            document.getElementById('ecran-resultats').classList.remove('hidden');
            document.getElementById('nom-final').innerText = "Agent: " + nomAgent;
            document.getElementById('score-chiffre').innerText = score;
        }

        function genererAttestation() {
            let lignes = historique.map(h => `<tr><td>${h.q}</td><td>${h.ok ? 'OK' : 'X'}</td><td>${h.juste}</td></tr>`).join('');
            const win = window.open('', '', 'width=800,height=900');
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px} table{width:100%;border-collapse:collapse} td,th{border:1px solid #ddd;padding:8px}</style></head>
            <body><h1>Attestation TSEE</h1><p>Agent: ${nomAgent}</p><p>Score: ${score}/10</p>
            <table><tr><th>Question</th><th>Etat</th><th>Bonne Réponse</th></tr>${lignes}</table>
            <script>window.print();<\/script></body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
